<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Deoria Taekwondo Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0b0f19;
    color: white;
    overflow-x: hidden;
}

:root {
    --primary: #111827;
    --secondary: #dc2626;
    --gold: #fbbf24;
    --dark: #030712;
}

/* =====================
   HEADER
===================== */

header {
    width: 100%;
    background: #030712;
    padding: 16px 8%;
    position: sticky;
    top: 0;
    z-index: 999;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
}

.logo h2 {
    font-size: 20px;
    font-weight: 700;
}

.back-btn {
    text-decoration: none;
    color: white;
    background: var(--secondary);
    padding: 10px 22px;
    border-radius: 50px;
    transition: 0.3s;
    font-weight: 600;
    font-size: 14px;
}

.back-btn:hover {
    background: #ef4444;
    transform: translateY(-2px);
}

/* =====================
   HERO
===================== */

.gallery-hero {
    padding: 100px 8% 70px;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72)),
        url('https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782467646/backgroundfinal_okbmtb.jpg');
    background-size: cover;
    background-position: center;
}

.gallery-hero h1 {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 18px;
    letter-spacing: -1px;
}

.gallery-hero span {
    color: var(--gold);
}

.gallery-hero p {
    max-width: 700px;
    margin: 0 auto;
    color: #d1d5db;
    line-height: 1.8;
    font-size: 17px;
}

/* =====================
   GALLERY GRID
===================== */

.gallery-section {
    padding: 70px 5%;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.gallery-card {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    cursor: pointer;
    background: #111827;
    aspect-ratio: 1 / 1;
}

.gallery-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.45s ease;
}

.gallery-card:hover img {
    transform: scale(1.07);
}

.gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
    display: flex;
    align-items: flex-end;
    padding: 18px;
    opacity: 0;
    transition: opacity 0.35s ease;
}

.gallery-card:hover .gallery-overlay {
    opacity: 1;
}

.gallery-overlay h3 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
}

/* =====================
   LIGHTBOX (POPUP)
===================== */

.popup {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.96);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 16px;
    /* Prevent body scroll when open */
}

.popup.active {
    display: flex;
}

.popup-inner {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.popup img {
    max-width: 100%;
    max-height: 90vh;
    width: auto;
    height: auto;
    border-radius: 14px;
    object-fit: contain;
    display: block;
    /* Prevent long-press save on mobile */
    -webkit-user-select: none;
    user-select: none;
   
}

.close-btn {
    position: fixed;
    top: 18px;
    right: 22px;
    font-size: 38px;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    z-index: 10000;
    line-height: 1;
    transition: color 0.2s;
    /* Larger tap target on mobile */
    padding: 8px;
}

.close-btn:hover {
    color: #fff;
}

/* Prev / Next arrows */
.nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    font-size: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 10000;
    /* Larger tap zone */
    touch-action: manipulation;
}

.nav-btn:hover {
    background: rgba(255,255,255,0.25);
}

.nav-btn.prev { left: 14px; }
.nav-btn.next { right: 14px; }

/* Image counter */
.img-counter {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #d1d5db;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 50px;
    z-index: 10000;
    font-family: 'Poppins', sans-serif;
}

/* =====================
   FOOTER
===================== */

footer {
    background: #030712;
    padding: 36px 8%;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.08);
}

footer p {
    color: #9ca3af;
    font-size: 14px;
}

/* =====================
   RESPONSIVE — TABLET
===================== */

@media (max-width: 900px) {
    .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .gallery-hero h1 {
        font-size: 46px;
    }
}

/* =====================
   RESPONSIVE — MOBILE
===================== */

@media (max-width: 600px) {

    header {
        padding: 14px 5%;
    }

    .logo img {
        width: 42px;
        height: 42px;
    }

    .logo h2 {
        font-size: 16px;
    }

    .back-btn {
        padding: 9px 16px;
        font-size: 13px;
    }

    .gallery-hero {
        padding: 70px 5% 50px;
    }

    .gallery-hero h1 {
        font-size: 34px;
        letter-spacing: -0.5px;
    }

    .gallery-hero p {
        font-size: 14px;
    }

    .gallery-section {
        padding: 40px 4%;
    }

    .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .gallery-card {
        border-radius: 12px;
    }

    /* Always show overlay label on mobile */
    .gallery-overlay {
        opacity: 1;
        background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    }

    .gallery-overlay h3 {
        font-size: 12px;
    }

    .nav-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
    }

    .nav-btn.prev { left: 8px; }
    .nav-btn.next { right: 8px; }

    .close-btn {
        top: 12px;
        right: 14px;
        font-size: 32px;
    }

}


/* =====================
   Photos BUTTONS
===================== */

.gallery-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin:40px 0 50px;
    flex-wrap:wrap;
}

.gallery-btn{
    text-decoration:none;
    padding:14px 34px;
    border-radius:50px;
    font-size:16px;
    font-weight:600;
    color:#fff;
    background:#111827;
    border:2px solid #dc2626;
    transition:0.3s ease;
}

.gallery-btn:hover{
    background:#dc2626;
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(220,38,38,0.35);
}

.gallery-btn.active{
    background:#dc2626;
    color:#fff;
    box-shadow:0 8px 20px rgba(220,38,38,0.35);
}

/* Mobile */
@media (max-width:600px){

    .gallery-buttons{
        gap:12px;
        margin:30px 0 35px;
    }

    .gallery-btn{
        padding:12px 22px;
        font-size:14px;
    }

}


/* =====================
   SCROLL TO TOP
===================== */

.scroll-top-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    width:55px;
    height:55px;
    border:none;
    border-radius:14px;
    background:#111827;
    color:#fbbf24;
    font-size:22px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.08);
    opacity:0;
    visibility:hidden;
    transform:translateY(20px);
    transition:.35s ease;
    z-index:9999;
}

.scroll-top-btn.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.scroll-top-btn:hover{
    background:#dc2626;
    color:#fff;
    transform:translateY(-4px);
}

@media(max-width:600px){

    .scroll-top-btn{
        width:48px;
        height:48px;
        right:18px;
        bottom:18px;
        font-size:18px;
        border-radius:12px;
    }

}
</style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="navbar">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/RohanTkd-ux/web-Photos/refs/heads/main/a56c0ac4-a6a0-4b51-a197-9ccc21ee9bd9.png" alt="Logo">
            <h2>Deoria Taekwondo</h2>
        </div>
        <a href="gallery.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>
</header>

<!-- HERO -->
<section class="gallery-hero">
    <h1>Training <span>Gallery</span></h1>
    <p>Explore moments from training sessions, championships, medal ceremonies and academy activities.</p>
</section>

<!-- Gallery Category Buttons -->


<!-- GALLERY -->
<section class="gallery-section">
    <div class="gallery-grid" id="galleryGrid"></div>
</section>

<!-- LIGHTBOX -->
<div class="popup" id="popup">
    <span class="close-btn" id="closeBtn">&times;</span>
    <button class="nav-btn prev" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
    <div class="popup-inner">
        <img src="" id="popupImg" alt="Gallery Image">
    </div>
    <button class="nav-btn next" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    <div class="img-counter" id="imgCounter">1 / 22</div>
</div>

<!-- FOOTER -->
<footer>
    <p>Deoria Taekwondo Association © 2026</p>
</footer>


<!-- Scroll To Top Button -->
<button id="scrollTopBtn" class="scroll-top-btn">
    <i class="fas fa-arrow-up"></i>
</button>



<script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
<script>

/* =====================
   IMAGE LIST — 22 photos
===================== */
const imageList = [
     "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782673546/WhatsApp_Image_2026-06-26_at_3.13.26_PM_ztytod.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782673546/WhatsApp_Image_2026-06-26_at_3.13.26_PM_1_dgm8jk.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782673546/WhatsApp_Image_2026-06-26_at_3.13.26_PM_2_fh28bx.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782673546/WhatsApp_Image_2026-06-26_at_3.13.26_PM_3_jofsgk.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674430/WhatsApp_Image_2026-06-29_at_12.49.13_AM_12_nlcag5.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674430/WhatsApp_Image_2026-06-29_at_12.49.13_AM_13_rmvqje.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674430/WhatsApp_Image_2026-06-29_at_12.49.13_AM_vbazdq.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674429/WhatsApp_Image_2026-06-29_at_12.49.13_AM_10_urkwy3.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674429/WhatsApp_Image_2026-06-29_at_12.49.13_AM_8_fdyxbj.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674429/WhatsApp_Image_2026-06-29_at_12.49.13_AM_11_gk9afy.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674429/WhatsApp_Image_2026-06-29_at_12.49.13_AM_9_wcy2ri.jpg",
     "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674429/WhatsApp_Image_2026-06-29_at_12.49.13_AM_7_pdbc38.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674428/WhatsApp_Image_2026-06-29_at_12.49.13_AM_6_p2mifx.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674428/WhatsApp_Image_2026-06-29_at_12.49.13_AM_5_ru2sam.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674428/WhatsApp_Image_2026-06-29_at_12.49.13_AM_4_q5deu3.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674428/WhatsApp_Image_2026-06-29_at_12.49.13_AM_3_x5zaee.jpg",
    "https://res.cloudinary.com/dl4pvlmzt/image/upload/v1782674427/WhatsApp_Image_2026-06-29_at_12.49.13_AM_1_nqyrb0.jpg",
   
    

];

/* =====================
   BUILD GRID
===================== */
const galleryGrid = document.getElementById('galleryGrid');

imageList.forEach((url, index) => {
    const card = document.createElement('div');
    card.classList.add('gallery-card');
    card.dataset.index = index;

    card.innerHTML = `
        <img src="${url}" alt="Gallery Image ${index + 1}" loading="lazy">
        <div class="gallery-overlay">
            <h3>Deoria Taekwondo</h3>
        </div>
    `;

    galleryGrid.appendChild(card);
});

/* =====================
   LIGHTBOX LOGIC
===================== */
const popup     = document.getElementById('popup');

const popupImg  = document.getElementById('popupImg');
let panzoom;
const closeBtn  = document.getElementById('closeBtn');
const prevBtn   = document.getElementById('prevBtn');
const nextBtn   = document.getElementById('nextBtn');
const counter   = document.getElementById('imgCounter');

let currentIndex = 0;

function openPopup(index){

    currentIndex = index;
    popupImg.src = imageList[currentIndex];
    counter.textContent = `${currentIndex + 1} / ${imageList.length}`;

    popup.classList.add("active");
    document.body.style.overflow = "hidden";

    popupImg.onload = () => {

        if(panzoom){
            panzoom.destroy();
        }

        panzoom = Panzoom(popupImg,{
            maxScale:5,
            minScale:1,
            contain:"outside"
        });

        popupImg.parentElement.addEventListener("wheel", panzoom.zoomWithWheel);

    };

}

function closePopup(){

    popup.classList.remove("active");
    document.body.style.overflow="";

    if(panzoom){
        panzoom.destroy();
        panzoom = null;
    }

}

function showNext() {
    currentIndex = (currentIndex + 1) % imageList.length;
    popupImg.src = imageList[currentIndex];
    if(panzoom){
    panzoom.reset();
}
    counter.textContent = `${currentIndex + 1} / ${imageList.length}`;
}

function showPrev() {
    currentIndex = (currentIndex - 1 + imageList.length) % imageList.length;
    popupImg.src = imageList[currentIndex];
    if(panzoom){
    panzoom.reset();
}
    counter.textContent = `${currentIndex + 1} / ${imageList.length}`;
}

/* Card click — open lightbox */
galleryGrid.addEventListener('click', (e) => {
    const card = e.target.closest('.gallery-card');
    if (card) openPopup(parseInt(card.dataset.index));
});

closeBtn.addEventListener('click', closePopup);
nextBtn.addEventListener('click', showNext);
prevBtn.addEventListener('click', showPrev);

/* Click backdrop to close */
popup.addEventListener('click', (e) => {
    if (e.target === popup) closePopup();
});

/* Keyboard navigation */
document.addEventListener('keydown', (e) => {
    if (!popup.classList.contains('active')) return;
    if (e.key === 'ArrowRight') showNext();
    if (e.key === 'ArrowLeft')  showPrev();
    if (e.key === 'Escape')     closePopup();
});

/* =====================
   SWIPE SUPPORT (mobile)
===================== */
let touchStartX = 0;
let touchEndX   = 0;

popup.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

popup.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
        if (diff > 0) showNext();
        else showPrev();
    }
}, { passive: true });

/* =====================
   SCROLL TO TOP
===================== */

const scrollBtn = document.getElementById("scrollTopBtn");

window.addEventListener("scroll", () => {

    if(window.scrollY > 400){
        scrollBtn.classList.add("show");
    }else{
        scrollBtn.classList.remove("show");
    }

});

scrollBtn.addEventListener("click", () => {

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

});
</script>
</body>
</html>
